services:
  web:
    build: .
    ports:
      - "5001:5000"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - FLASK_ENV=development
      - PORT=5000
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
